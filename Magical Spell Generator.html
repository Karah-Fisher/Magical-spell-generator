<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Spell Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="spellbook-card">
        <h1>Welcome to the Magical Spell Generator!</h1>

        <p>These are the ingredients you can use to create your magical spells.
            Use the generator to pick an ingredient to base your spell off of:</p>
        <ul id="ingredientsList">
            <li>Dragon Scale</li>
            <li>Phoenix Feather</li>
            <li>Unicorn Horn</li>
        </ul>

        <p>Try it out!:</p>
        <div class="button-group">
            <button id="generateButton">Generate Spell</button>
            <button id="resetButton">Reset</button>
        </div>

        <div id="spellArea"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
